server {
    listen 80;
    listen [::]:80;
    server_name radio.yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name radio.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/radio.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radio.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # Proxy to Node.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for HLS streaming
        proxy_read_timeout    300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;

        # Disable buffering for streaming endpoints
        location ~ ^/api/stream/ {
            proxy_pass         http://127.0.0.1:3000;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        proxy_pass       http://127.0.0.1:3000;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}
